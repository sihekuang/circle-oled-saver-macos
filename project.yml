name: CircleOLEDSaver
options:
  bundleIdPrefix: com.shoebillsoft.circle
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    # Required for notarization. Applies hardened runtime to every signing
    # pass during the build, not just the outer app — without this, embedded
    # SPM frameworks (MacHUD, CircleKit) ship without it and Apple's static
    # check rejects the bundle as Invalid.
    ENABLE_HARDENED_RUNTIME: YES
    # Defaults for local builds. CI release builds override both via xcodebuild
    # build settings, sourcing MARKETING_VERSION from the v* tag and
    # CURRENT_PROJECT_VERSION from github.run_number. See docs/distribution.md.
    MARKETING_VERSION: "1.3.6"
    CURRENT_PROJECT_VERSION: "11"

packages:
  CircleKit:
    path: CircleKit
  MacHUD:
    url: https://github.com/orchetect/MacHUD
    from: 0.5.2

targets:
  CircleApp:
    type: application
    platform: macOS
    sources:
      - path: CircleApp
    dependencies:
      - package: CircleKit
      - package: MacHUD
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shoebillsoft.circle
        INFOPLIST_FILE: CircleApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: CircleApp/CircleApp.entitlements
        PRODUCT_NAME: Circle
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"

  CircleSaver:
    type: bundle
    platform: macOS
    sources:
      - path: CircleSaver
    dependencies:
      - package: CircleKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shoebillsoft.circle.saver
        INFOPLIST_FILE: CircleSaver/Info.plist
        PRODUCT_NAME: Circle
        WRAPPER_EXTENSION: saver
        SKIP_INSTALL: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @loader_path/../Frameworks"

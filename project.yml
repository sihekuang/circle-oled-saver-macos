name: CircleOLEDSaver
options:
  bundleIdPrefix: com.danielkurin.circle
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  CircleKit:
    path: CircleKit

targets:
  CircleApp:
    type: application
    platform: macOS
    sources:
      - path: CircleApp
    dependencies:
      - package: CircleKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.danielkurin.circle
        INFOPLIST_FILE: CircleApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: CircleApp/CircleApp.entitlements
        PRODUCT_NAME: Circle
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"

  CircleSaver:
    type: bundle
    platform: macOS
    sources:
      - path: CircleSaver
    dependencies:
      - package: CircleKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.danielkurin.circle.saver
        INFOPLIST_FILE: CircleSaver/Info.plist
        PRODUCT_NAME: Circle
        WRAPPER_EXTENSION: saver
        SKIP_INSTALL: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @loader_path/../Frameworks"
